services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vfims-backend
    ports:
      - "8000:8000" 
    environment:
      - PORT=8000
      - MY_HOST=${MY_HOST}
      - MY_PORT=${MY_PORT}
      - MY_USER=${MY_USER}
      - MY_PASS=${MY_PASS}
      - MY_DB=${MY_DB}
      - EMB_URL=http://host.docker.internal:8001
      - LLM_URL=http://host.docker.internal:8002
      - CHROMA_URL=http://chromadb:8000
      - RERANKER_URL=http://host.docker.internal:8004
      - USE_AS_CTX_MIN=0.55
    volumes:
      - ./uploads:/app/server/uploads
      - ./.env:/app/.env
    depends_on:
      - embedding
      - llm
      - chromadb
    extra_hosts:
      - "host.docker.internal:host-gateway"

  embedding:
    image: vllm/vllm-openai:latest
    container_name: vfims-embedding
    ports:
      - "8001:8001"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: >
      --model BAAI/bge-m3
      --host 0.0.0.0
      --port 8001
      --gpu-memory-utilization 0.05
      --max-model-len 8192
      --disable-log-stats
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  llm:
    image: vllm/vllm-openai:latest
    container_name: vfims-llm
    ports:
      - "8002:8002"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: >
      --model Qwen/Qwen3-VL-8B-Instruct
      --served-model-name qwen3
      --dtype auto
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.88
      --max-model-len 16384
      --enable-prefix-caching
      --host 0.0.0.0
      --port 8002
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  reranker:
    image: vllm/vllm-openai:latest
    container_name: vfims-reranker
    ports:
      - "8004:8004"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command: >
      --model BAAI/bge-reranker-v2-m3
      --host 0.0.0.0
      --port 8004
      --gpu-memory-utilization 0.04
      --max-model-len 8192
      --disable-log-stats
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: vfims-chromadb
    ports:
      - "8003:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE

volumes:
  chroma_data: